<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to speech Convertor</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            box-sizing: border-box;
        

        }
        .hero{
            height: 100vh;
            width: 100vw;
            background: linear-gradient(45deg,blue,violet);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
    
        }
        h1{
            color: white;
            text-align: center;
            margin: 30px;
            font-size: clamp(35px ,5vw,50px)
        }
        .hero textarea{
            color: white;
            margin-bottom: 20px;
            outline: 0;
            border: 0;
            padding: 25px;
            font-size: 15px;
            border-radius: 10px;
            
            /* width: 100%;
            max-width: 600px;
            min-height: 120px;
            height: 60vh; */
            width: 100%;
            max-width: 600px;
            min-height: 250px;
            max-height: 50vh;
            /* max-width: 800px; */
            /* width: 600px; */
            /* height: 250px; */
            background-color: rgb(76, 86, 200);
        }
        textarea::placeholder{
            font-size: 16px;
            color: white;
        }
        .box{
            /* height: 50vh; */
            width: 100%;
            max-width: 600px;
            padding: 10px;
            margin: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;

        }
        .box select{
            padding: 10px;
            flex: 1;
            /* max-width: 600px; */
            /* width: 60vw; */
            background-color:  rgb(76, 86, 200);
            border: 0;
            outline: 0;
            border-radius: 20px;
            color: white;
            font-size: 15px;
            
        }
        .box button{
            background-color: orangered;
            border-radius: 20px;
            outline: 0;
            border: 0;
            padding: 10px;
            color:white;
            font-size: 15px;
            cursor: pointer;
        }

        
    </style>
</head>
<body>

<div class="hero">

    <h1>Text To Speech <span style="text-align: center; color:orangered; text-decoration: underline; text-decoration-color: white;">Convertor</span></h1>
    <textarea name="text" id="text" placeholder="Write here anything"></textarea>
    <div class="box">
    <select id="lan"><option value="">Hello</option></select>
    <button>▶️ Listen</button>
    </div>
</div>

    
</body>
</html>
